version: '3.8'

services:
  xiaoli-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xiaoli-api
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3